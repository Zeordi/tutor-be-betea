services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: betea
      POSTGRES_PASSWORD: betea
      POSTGRES_DB: betea
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://betea:betea@db:5432/betea?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - '4000:4000'
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_WS_URL: http://localhost:4000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
    ports:
      - '3000:3000'
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '8080:80'
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
