services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: tutor_user
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: tutor_be_betea
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tutor-network

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks:
      - tutor-network

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://tutor_user:secure_password@postgres:5432/tutor_be_betea?schema=public
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
    ports:
      - '4000:4000'
    depends_on:
      - postgres
      - redis
    networks:
      - tutor-network

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_WS_URL: http://localhost:4000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - tutor-network

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - '80:80'
      - '443:443'
      - '8080:80'
    depends_on:
      - frontend
      - backend
    networks:
      - tutor-network

volumes:
  postgres_data:

networks:
  tutor-network:
