name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
  workflow_dispatch:
    inputs:
      validate_only:
        description: 'Only validate Neon credentials (no branch create)'
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  validate_neon:
    name: Validate Neon credentials
    if: github.event_name == 'workflow_dispatch' && inputs.validate_only
    runs-on: ubuntu-latest
    steps:
      - name: Check Neon project access
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID || 'odd-boat-86392327' }}
        run: |
          set -euo pipefail
          if [ -z "${NEON_API_KEY}" ]; then
            echo "NEON_API_KEY secret is empty"
            exit 1
          fi
          code=$(curl -sS -o /tmp/neon_project.json -w "%{http_code}" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            -H "Accept: application/json" \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}")
          echo "Neon API HTTP status: ${code}"
          if [ "${code}" != "200" ]; then
            head -c 300 /tmp/neon_project.json || true
            exit 1
          fi
          python3 - <<'PY'
          import json
          data=json.load(open('/tmp/neon_project.json'))
          project=data.get('project') or data
          print('project_id=', project.get('id'))
          print('project_name=', project.get('name'))
          print('NEON_CREDENTIALS_OK')
          PY

  setup:
    name: Setup
    if: github.event_name == 'pull_request'
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  create_neon_branch:
    name: Create Neon Branch
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Get branch expiration date as an env variable (2 weeks from now)
        id: get_expiration_date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID || 'odd-boat-86392327' }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Run Migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID || 'odd-boat-86392327' }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
