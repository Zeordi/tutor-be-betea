name: Deploy

# Production is Railway (API) + Vercel (frontend).
# This workflow verifies a production build on every main push.
# Redeploy the API with: cd backend && npx @railway/cli@latest up -d -y
# Frontend production deploys via Vercel (not SSH/docker).

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  verify:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Test backend
        working-directory: backend
        run: npm test

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        env:
          # Build-time placeholders; Vercel injects real values on its deploy.
          NEXT_PUBLIC_API_URL: https://api-production-53a9.up.railway.app/api
          NEXT_PUBLIC_WS_URL: https://api-production-53a9.up.railway.app
          NEXTAUTH_URL: https://tutor-be-betea.vercel.app
          NEXTAUTH_SECRET: ci-build-placeholder-not-used-in-prod
        run: npm run build
