name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: |
          docker build -f docker/Dockerfile.backend -t betea-backend .
          docker build -f docker/Dockerfile.frontend -t betea-frontend .
